<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Economic Indicators - 1Y Stable View</title>
    <style>
      /* 画面いっぱいに表示するための設定 */
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #131722;
      }
      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        height: 100vh;
        width: 100vw;
        gap: 1px; /* わずかな隙間を入れて区切りを見やすく */
        background-color: #2a2e39; /* 境界線の色 */
      }
      .chart-box {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="chart-box" id="widget-1"></div>
      <div class="chart-box" id="widget-2"></div>
      <div class="chart-box" id="widget-3"></div>
      <div class="chart-box" id="widget-4"></div>
    </div>

    <script
      type="text/javascript"
      src="https://s3.tradingview.com/tv.js"
    ></script>
    <script type="text/javascript">
      function createStableWidget(containerId, symbol, name) {
        new TradingView.MediumWidget({
          symbols: [
            [
              name,
              symbol +
                '|1Y' /* ← ここが重要！|1Y をつけることで1年表示になります */,
            ],
          ],
          chartOnly: false,
          width: '100%',
          height: '100%',
          locale: 'ja',
          colorTheme: 'dark',
          autosize: true,
          showVolume: false,
          hideDateProperties: false,
          scalePosition: 'right',
          scaleMode: 'Normal',
          fontFamily: 'Trebuchet MS, sans-serif',
          fontSize: '10',
          chartType: 'area' /* ライン（面積）チャートを指定 */,
          container_id: containerId,
        });
      }

      // 全て実績のあるシンボルで作成
      createStableWidget('widget-1', 'PEPPERSTONE:JPN225', '日経平均');
      createStableWidget('widget-2', 'OANDA:USDJPY', '米ドル/円');
      createStableWidget('widget-3', 'OANDA:WTICOUSD', '原油 (WTI)');
      createStableWidget('widget-4', 'OANDA:SPX500USD', 'S&P 500');
    </script>
  </body>
</html>
