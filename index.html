<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stable Economy Dashboard</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #131722;
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        height: 100vh;
        width: 100vw;
        gap: 4px;
        background-color: #2a2e39;
      }

      .chart-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        background-color: #131722;
        overflow: hidden;
      }

      /* 中央上の大きなタイトル */
      .custom-label {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        color: #ffffff;
        font-size: 2.5vw;
        font-weight: 900;
        text-align: center;
        text-shadow:
          0 0 10px rgba(0, 0, 0, 1),
          0 0 5px rgba(0, 0, 0, 1);
        white-space: nowrap;
        pointer-events: none;
      }

      /* 背後の巨大透かし文字 */
      .watermark {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 8vw;
        font-weight: bold;
        color: rgba(255, 255, 255, 0.05);
        white-space: nowrap;
        z-index: 1;
        pointer-events: none;
      }

      .chart-box {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="chart-wrapper">
        <div class="custom-label">日経平均株価</div>
        <div class="watermark">日経平均</div>
        <div id="widget-1" class="chart-box"></div>
      </div>
      <div class="chart-wrapper">
        <div class="custom-label">ニューヨークダウ</div>
        <div class="watermark">NY DOW</div>
        <div id="widget-2" class="chart-box"></div>
      </div>
      <div class="chart-wrapper">
        <div class="custom-label">米ドル / 円</div>
        <div class="watermark">USD / JPY</div>
        <div id="widget-3" class="chart-box"></div>
      </div>
      <div class="chart-wrapper">
        <div class="custom-label">原油 (WTI先物)</div>
        <div class="watermark">原油</div>
        <div id="widget-4" class="chart-box"></div>
      </div>
    </div>

    <script
      type="text/javascript"
      src="https://s3.tradingview.com/tv.js"
    ></script>
    <script type="text/javascript">
      function createStableWidget(containerId, symbol) {
        new TradingView.MediumWidget({
          symbols: [['', symbol + '|1Y']],
          chartOnly: false,
          width: '100%',
          height: '100%',
          locale: 'ja',
          colorTheme: 'dark',
          autosize: true,
          showVolume: false,
          hideDateProperties: false,
          scalePosition: 'right',
          scaleMode: 'Normal',
          fontFamily: 'Arial, sans-serif',
          fontSize: '14',
          chartType: 'area',
          container_id: containerId,
          backgroundColor: 'rgba(19, 23, 34, 0)',
        });
      }

      createStableWidget('widget-1', 'PEPPERSTONE:JPN225');
      createStableWidget('widget-2', 'PEPPERSTONE:US30');
      createStableWidget('widget-3', 'OANDA:USDJPY');
      createStableWidget('widget-4', 'OANDA:WTICOUSD');
    </script>
  </body>
</html>
