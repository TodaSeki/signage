<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Personal 3X Leverage Dashboard</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #131722;
        font-family: sans-serif;
      }
      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        height: 100vh;
        width: 100vw;
        gap: 2px;
        background-color: #2a2e39;
      }
      .chart-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .custom-label {
        position: absolute;
        top: 10px;
        right: 120px;
        z-index: 10;
        color: rgba(255, 255, 255, 0.6);
        font-size: 1.1vw;
        font-weight: bold;
        text-shadow: 0 0 5px #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="chart-wrapper">
        <div class="custom-label">半導体 Bull (3x)</div>
        <div id="chart-1" style="height: 100%"></div>
      </div>
      <div class="chart-wrapper">
        <div class="custom-label">S&P500 Bull (3x)</div>
        <div id="chart-2" style="height: 100%"></div>
      </div>
      <div class="chart-wrapper">
        <div class="custom-label">NASDAQ100 Bull (3x)</div>
        <div id="chart-3" style="height: 100%"></div>
      </div>
      <div class="chart-wrapper">
        <div class="custom-label">Technology Bull (3x)</div>
        <div id="chart-4" style="height: 100%"></div>
      </div>
    </div>

    <script
      type="text/javascript"
      src="https://s3.tradingview.com/tv.js"
    ></script>
    <script type="text/javascript">
      function createAdvancedWidget(id, symbol) {
        new TradingView.widget({
          autosize: true,
          symbol: symbol,
          interval: 'D',
          range: '1Y' /* 表示期間1年 */,
          timezone: 'Asia/Tokyo',
          theme: 'dark',
          style: '1' /* ローソク足 */,
          locale: 'ja',
          toolbar_bg: '#131722',
          enable_publishing: false,
          hide_top_toolbar: false,
          hide_legend: false,
          save_image: false,
          container_id: id,
          backgroundColor: '#131722',
          studies: ['MAExp@tv-basicstudies'],
        });
      }

      // すべてBATS経由の3倍レバレッジ銘柄に設定
      createAdvancedWidget('chart-1', 'BATS:SOXL');
      createAdvancedWidget('chart-2', 'BATS:SPXL');
      createAdvancedWidget('chart-3', 'BATS:TQQQ');
      createAdvancedWidget('chart-4', 'BATS:TECL');
    </script>
  </body>
</html>
